<div class="p-8">
  <div class="mb-8">
    <p class="text-xs font-mono uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">
      Bienvenido de vuelta
    </p>
    <h1 class="text-2xl font-semibold text-slate-900 dark:text-slate-50 tracking-tight">
      {{ auth.currentUser()?.full_name }}
    </h1>
  </div>

  <!-- Placeholder cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    @for (card of cards; track card.label) {
      <div
        class="p-5 rounded-xl bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/60"
      >
        <p class="text-xs font-mono uppercase tracking-widest text-slate-400 mb-3">
          {{ card.label }}
        </p>
        <p class="text-3xl font-semibold font-mono text-slate-900 dark:text-slate-50">
          {{ card.value }}
        </p>
      </div>
    }
  </div>

  <div
    class="mt-8 p-5 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 text-center"
  >
    <p class="text-slate-400 dark:text-slate-500 text-sm font-mono">
      Phase 3 — Object engine &amp; records
    </p>
  </div>
</div>
